<!--
  VocabolarIo -- Changelog
  ========================
  Hinweis: APP_VERSION und dieser Changelog-Kommentar gab es bisher noch
  nicht in dieser Datei -- ab V16 neu eingeführt, rückwirkend kurz notiert.

  V27: Neue Spalten uebersetzung_de/uebersetzung_it unterstützt (neues
       xlsx-Format). Sind BEIDE gefüllt, entsteht eine eigene Kartenseite
       mit beiden Sätzen untereinander (Reihenfolge nach RICHTUNG); ist nur
       eine oder keine gefüllt, entfällt die Seite komplett. Bei Verben
       erscheint sie nach dem kuratierten Beispielsatz, sonst direkt nach
       der Antwortseite. Notizseiten bleiben unverändert danach. Mit Node
       an 5 Fallkombinationen aus der echten Beispieldatei durchgetestet.
  V26: Beispielsatz steht bei Verben nicht mehr auf Frage-/Antwortseite,
       sondern auf einer eigenen Kartenseite direkt nach der Konjugation
       (zustand 3) -- zeigt beide Sprachen (it+de) untereinander, Reihen-
       folge richtet sich nach RICHTUNG (bei DE->IT steht Deutsch oben).
       Schriftgröße auf Beispielsatz- und Notizseiten vergrößert (13px auf
       16px bzw. 16px auf 19px). Notizseiten-Farbe (--cielo) noch einmal
       deutlich aufgehellt.
  V25: Konjugationsseite (bei Verben) farblich identisch zur Rückseite
       gemacht (vorher eigene dunkle Farbe) -- inkl. Tabellen-Trennlinien
       und Wort-Farbe angepasst, da jetzt heller statt dunkler Hintergrund.
       Notizseiten-Farbe (--cielo) noch einmal deutlich aufgehellt/dezenter.
  V24: Farbschema von Blau auf Rot umgestellt (--inchiostro/--carta/--mare/
       --cielo/--azzurro + alle fest codierten Hex-Werte). Vorderseite
       (Frage) jetzt kräftig hervorgehoben (var(--mare), helle Schrift),
       Rückseite (Antwort) bewusst dezent/hell -- vorher war es andersrum
       (Frage hell, Antwort kräftig dunkel). Notizseite hat jetzt eine
       eigene, dritte Farbidentität (var(--cielo)) statt derselben dunklen
       Farbe wie Rückseite/Konjugation.
  V23: Drei kleinere Anpassungen + eine große. "VocabolarIo laden" nur noch
       auf dem leeren Startbildschirm (globaler Fußzeilen-Link entfernt).
       "N"-Badge (Notiz-Hinweis oben rechts) entfernt. "Notiz"-Beschriftung
       auf der Notizseite entfernt. GROSS: das komplette Fortschritts-
       Tracking-Konzept entfernt -- keine "Karten heute"-Statistik mehr,
       kein Wiederaufnehmen der Position beim erneuten Öffnen eines Decks
       (jedes Deck startet jetzt immer bei Karte 1), "Fortschritt
       zurücksetzen"-Link entfernt (nichts mehr zum Zurücksetzen).
       ladeFortschritt()/speichereFortschritt()/aktualisiereStats() komplett
       gestrichen; loescheAltenFortschritt() bleibt (räumt jetzt nur noch
       Alt-Daten früherer Versionen + den Wiedervorlagestapel auf).
  V22: Zwei größere Änderungen. (1) Karten lassen sich jetzt zusätzlich zu
       den Buttons per Wisch-Geste bedienen (links=weiter, rechts=zurück),
       einheitlich für Touch und Maus über die Pointer-Events-API
       (aktiviereWischGesten()); normales Antippen dreht wie bisher die
       Karte um. (2) Neue deckübergreifende Wiedervorlage-Funktion: Button
       "Merken" (Umschalter, wird zu "Gemerkt") legt die aktuelle Karte in
       einen Stapel; dieser erscheint als eigene, farblich abgehobene
       Kachel auf der Deck-Auswahl (nur wenn nicht leer) und lässt sich wie
       ein normales Deck lernen -- dort heißt der Button "Entfernen" und
       wirft die Karte direkt raus. Stapel wird zusammen mit dem übrigen
       Fortschritt gelöscht (neue Datei, App-Reset).
  V21: notiz1/notiz2 sind jetzt zwei getrennte Kartenseiten zum Umblättern
       (vorher eine gemeinsame, zweigeteilte Notiz-Seite). Zeilenumbrüche
       aus der xlsx-Zelle (Strg+Enter/Alt+Enter) werden jetzt auf allen
       Kartenseiten (Frage, Antwort, Kategorie, Notizen) als <br> dargestellt
       -- vorher wurden sie von HTML stillschweigend ignoriert.
  V20: Warnungstext beim App-Reset gekürzt ("VocabolarIo wirklich
       zurücksetzen?"). "VocabolarIo"-Schriftzug oben links jetzt klickbar
       (Home-Funktion, wie "Deck wechseln", mit Fallback auf den leeren
       Startzustand falls noch keine Datei geladen ist). Beschreibungstext
       bei "Sortiert" geändert zu "Immer gleiche Reihenfolge".
  V19: Neuer "Liste"-Button auf der Sortier-Auswahl -- zeigt das Deck als
       Tabelle (nur it/de, Reihenfolge nach gewählter Richtung). Abstand vor
       "App zurücksetzen" wieder verkleinert (jetzt bündig unter der letzten
       Deck-Kachel statt abgesetzt).
  V18: Natives confirm() beim App-Reset durch eigenes, gestyltes
       Bestätigungs-Dialogfeld ersetzt (zeigeBestaetigung()). Abstand vor
       "App zurücksetzen" vergrößert (deutlicher abgesetzt).
  V17: "App zurücksetzen" nur noch auf der Deck-Auswahl sichtbar (zentriert
       unter den Kacheln, nicht mehr in der globalen Fußzeile). Richtungs-
       und Sortier-Auswahl: Erklärtexte entfernt, beide Buttons pro Screen
       jetzt farblich identisch (var(--mare), vorher unterschiedlich).
  V16: "App zurücksetzen" ergänzt (löscht vocab-datei + alle
       vocab-progress-*-Keys, danach location.reload()). APP_VERSION
       eingeführt.
  V15: Laden-Hub: "Eigene Vokabeln laden" im selben Kachel-Stil wie die
       Config-Buttons; Erklärsatz in der Deck-Auswahl entfernt.
  V14: Neuer "Laden"-Hub -- oben eigene Datei hochladen, unten vordefinierte
       Vokabelsets aus config.xlsx als Kacheln.
  V13: GitHub-Raw-URL wird automatisch aus der aktuellen Seiten-Adresse
       abgeleitet (statt fest codiertem Repo-Namen).
  V12: "VocabolarIo laden"-Button lädt config.xlsx und zeigt die darin
       gelisteten Dateien zur Auswahl.
  V11: Web-App-Manifest + Icons ergänzt (Installierbarkeit auf Android/iOS);
       fester "VocabolarIo laden"-Button (eine feste Datei).
  V10: localStorage-Polyfill für window.storage (Persistenz funktioniert
       jetzt auch außerhalb der Claude-Artefakt-Umgebung, z.B. GitHub Pages).
  V9 und früher: siehe frühere Dateiversionen (u.a. -care/-gare-Konjugation,
       Beispielsatz auf der Frage-Seite).
-->

<meta name="theme-color" content="#5c1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vocabolario">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root{
    --inchiostro: #5c1a1a;     /* dunkles Weinrot, "Tinte" (ehem. Marineblau) */
    --carta: #fbf2f0;          /* Papierton, warmes Rosé-Weiß (ehem. Blauweiß) */
    --mare: #a1332f;           /* kräftiges Rot, starker Akzent (ehem. Seeblau) */
    --cielo: #f8e7e4;          /* sehr helles, blasses Altrosa, Kontrastfarbe (ehem. Himmelblau) */
    --azzurro: #c94a3f;        /* klares Ziegelrot, Akzent (ehem. Azurblau) */
    --linea: rgba(92,26,26,0.14);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background: var(--carta);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(92,26,26,0.06) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--inchiostro);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
  }

  .app{
    width:100%;
    max-width:480px;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    padding: 20px 18px 28px;
  }

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 6px;
  }
  .titel{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 28px;
    letter-spacing: -0.01em;
  }
  .titel em{ color: var(--azzurro); font-style: normal; }
  .untertitel{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    color: var(--inchiostro);
    opacity:0.55;
  }

  .stage{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    perspective: 1400px;
  }

  .deck-label{
    text-align:center;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    opacity:0.5;
    margin-bottom:10px;
  }

  .card{
    position:relative;
    width:100%;
    aspect-ratio: 4/5;
    max-height: 420px;
    cursor:pointer;
    touch-action: none;
    user-select: none;
  }

  .face{
    position:absolute;
    inset:0;
    border-radius: 18px;
    border: 1.5px solid var(--inchiostro);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 32px 24px;
    text-align:center;
    box-shadow: 6px 6px 0 var(--inchiostro);
    transition: transform 0.35s cubic-bezier(.4,.2,.2,1), opacity 0.25s ease;
  }
  /* Vorderseite (Frage): bewusst die kräftigste/auffälligste der vier Seiten
     -- das ist ja die erste, die man sieht. */
  .face.front{ background: var(--mare); color: var(--carta); }

  /* Rückseite (Antwort): bewusst dezent/hell -- Gegenpol zur kräftigen
     Vorderseite, damit "Frage" und "Antwort" auf einen Blick unterscheidbar sind. */
  .face.back{ background: #fdf6f5; color: var(--inchiostro); }

  /* Konjugationsseite: farblich identisch zur Rückseite (Antwort) --
     beides "erklärende" Folgeseiten nach der Frage, sollen sich nicht
     gegenseitig konkurrieren. */
  .face.konjugation{ background: #fdf6f5; color: var(--inchiostro); }

  /* Notizseite: eigene, dritte Farbidentität (helles Altrosa) -- damit sofort
     erkennbar ist "das ist eine Notiz", nicht Frage/Antwort/Konjugation. */
  .face.notiz{ background: var(--cielo); color: var(--inchiostro); }

  /* Eigene Beispielsatz-Seite (nur bei Verben, nach der Konjugation) --
     gleiche "dezente" Farbe wie Rückseite/Konjugation, da inhaltlich
     dieselbe Kategorie "erklärende Zusatzseite". gap sorgt für Abstand
     zwischen den zwei übereinanderstehenden Sätzen (it/de). */
  .face.beispielsatz{ background: #fdf6f5; color: var(--inchiostro); gap:14px; }

  /* Übersetzungsseite aus den xlsx-Spalten uebersetzung_de/uebersetzung_it --
     gleicher dezenter Stil wie die Beispielsatz-Seite (konzeptionell
     dieselbe Kategorie "Satzpaar zur Vertiefung"). */
  .face.uebersetzung{ background: #fdf6f5; color: var(--inchiostro); gap:14px; }

  .face.eintretend{
    transform: scale(0.96);
    opacity: 0;
  }

  .konj-tabelle{
    width:100%;
    max-width:260px;
    font-size:13px;
    text-align:left;
    border-collapse: collapse;
    margin-top:6px;
  }
  .konj-tabelle tr{ border-bottom: 1px solid rgba(92,26,26,0.15); }
  .konj-tabelle tr:last-child{ border-bottom:none; }
  .konj-tabelle td{ padding: 5px 4px; }
  .konj-tabelle td.pron{ opacity:0.55; width:34%; }
  .konj-tabelle td.form{ font-weight:600; color: var(--azzurro); }

  .kategorie{
    position:absolute;
    top:14px;
    left:16px;
    font-size:10px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    opacity:0.5;
  }

  .wort{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 36px;
    line-height:1.1;
    margin-bottom:10px;
  }
  .face.back .wort, .face.konjugation .wort{ color: var(--mare); }

  .artikel{
    font-size:13px;
    opacity:0.55;
    margin-bottom: 18px;
  }

  .hinweis{
    font-size:12px;
    opacity:0.45;
    position:absolute;
    bottom:16px;
  }

  .beispiel{
    font-size:16px;
    line-height:1.5;
    opacity:0.85;
    font-style:italic;
    max-width: 90%;
  }

  .notiz-text{
    font-size:19px;
    line-height:1.6;
    max-width: 90%;
    white-space: pre-wrap;
  }

  .controls{
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  button{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:14px;
    border-radius: 12px;
    border: 1.5px solid var(--inchiostro);
    padding: 14px 0;
    flex:1;
    cursor:pointer;
    background:#fdf6f5;
    color:var(--inchiostro);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: 3px 3px 0 var(--inchiostro);
  }
  button:active{ transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--inchiostro); }

  .btn-zurueck{ background: #fbe9e7; flex:0.8; font-size:13px; padding:12px 0; }
  .btn-weiter{ background: var(--azzurro); color:#fdf6f5; flex:0.8; font-size:13px; padding:12px 0; }
  .btn-merken{
    flex:1.2;
    background: var(--carta);
    border-color: var(--mare);
    color: var(--mare);
  }
  .btn-merken.aktiv{ background: var(--mare); color:#fff; }
  button:disabled{ opacity:0.35; cursor:default; }
  button:disabled:active{ transform:none; box-shadow: 3px 3px 0 var(--inchiostro); }

  .reset-row{
    text-align:center;
    margin-top: 18px;
    font-size:12px;
  }
  .reset-row a{
    color: var(--inchiostro);
    opacity:0.5;
    text-decoration: underline;
    cursor:pointer;
  }

  .fertig{
    text-align:center;
    padding: 40px 10px;
  }
  .fertig .wort{ font-size:24px; }
  .fertig p{ opacity:0.6; font-size:14px; margin: 10px 0 22px; }

  @media (prefers-reduced-motion: reduce){
    .card{ transition: none; }
  }

  /* Niveau-Auswahl */
  .niveau-screen{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap: 8px;
  }
  .niveau-frage{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .niveau-unter{
    font-size:13px;
    opacity:0.55;
    margin-bottom: 28px;
    max-width: 280px;
  }
  .niveau-optionen{
    display:flex;
    flex-direction:column;
    gap: 14px;
    width: 100%;
    max-width: 320px;
  }
  .niveau-btn{
    text-align:left;
    border: 1.5px solid var(--inchiostro);
    border-radius: 14px;
    padding: 18px 20px;
    background: #fdf6f5;
    cursor:pointer;
    box-shadow: 4px 4px 0 var(--inchiostro);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .niveau-btn:active{ transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--inchiostro); }
  .niveau-btn .label{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 20px;
    display:block;
  }
  .niveau-btn .desc{
    font-size:12px;
    opacity:0.55;
    margin-top: 4px;
    display:block;
  }
  .niveau-btn.a1 .label{ color: var(--mare); }
  .niveau-btn.a2 .label{ color: var(--mare); }

  /* Dritter, dünnerer Button auf der Sortier-Auswahl ("Liste") -- bewusst
     kompakter und leicht abgesetzt, damit klar ist: andere Kategorie von
     Aktion als "Sortiert"/"Gemischt" (kein Karteikarten-Modus, sondern
     eine Tabellenansicht). */
  .niveau-btn.liste{
    padding: 10px 20px;
    text-align:center;
    border-width: 1px;
    box-shadow: 2px 2px 0 var(--inchiostro);
    margin-top: 8px;
  }
  .niveau-btn.liste:active{ box-shadow: 1px 1px 0 var(--inchiostro); }
  .niveau-btn.liste .label{
    font-size:15px;
    color: var(--mare);
  }

  /* Tabellenansicht (Liste) */
  .liste-wrapper{
    max-height: 60vh;
    overflow-y:auto;
    width:100%;
    max-width:420px;
    border: 1.5px solid var(--inchiostro);
    border-radius: 12px;
  }
  .liste-tabelle{
    width:100%;
    border-collapse: collapse;
    font-size:14px;
  }
  .liste-tabelle th{
    font-family:'Fraunces', serif;
    font-weight:600;
    text-align:left;
    padding: 9px 12px;
    border-bottom: 2px solid var(--inchiostro);
    color: var(--inchiostro);
    background: var(--carta);
    position: sticky;
    top: 0;
  }
  .liste-tabelle td{
    padding: 7px 12px;
    border-bottom: 1px solid rgba(23,50,79,0.12);
  }
  .liste-tabelle tr:nth-child(even) td{ background: rgba(63,143,209,0.06); }
  .niveau-wechsel{
    text-align:center;
    margin-top: 12px;
    font-size:12px;
  }
  .niveau-wechsel a{
    color: var(--inchiostro);
    opacity:0.5;
    text-decoration: underline;
    cursor:pointer;
  }

  /* Upload-Bereich */
  .upload-zone{
    border: 2px dashed var(--inchiostro);
    border-radius: 14px;
    padding: 28px 20px;
    text-align:center;
    cursor:pointer;
    background: rgba(255,255,255,0.3);
    transition: background 0.15s;
    position:relative;
    margin-top: 8px;
  }
  .upload-zone:hover, .upload-zone.drag{ background: rgba(255,255,255,0.65); }
  .upload-zone input[type=file]{
    position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
  }
  .upload-icon{ font-size:32px; margin-bottom:6px; }
  .upload-text{ font-size:13px; opacity:0.6; line-height:1.5; }
  .upload-text strong{ color: var(--mare); }
  .upload-fehler{
    background: #fbebe9;
    border: 1.5px solid var(--mare);
    border-radius: 10px;
    padding: 10px 14px;
    font-size:12px;
    color: var(--mare);
    margin-top: 10px;
    display:none;
  }
  .upload-info{
    font-size:11px;
    opacity:0.45;
    margin-top:10px;
    text-align:center;
    line-height:1.5;
  }
  .niveau-btn.eigene .label{ color: var(--azzurro); }

  /* Wiedervorlage-Kachel: bewusst anderer Farbton als normale Deck-Kacheln
     (.eigene), damit auf den ersten Blick klar ist -- das ist kein
     gleichwertiges Deck, sondern ein Sonderstapel. */
  .niveau-btn.wiedervorlage{
    border-color: var(--azzurro);
    background: #fbeceb;
  }
  .niveau-btn.wiedervorlage .label{ color: var(--azzurro); }

  /* Eigenes Bestätigungs-Dialogfeld (ersetzt das native, hässliche confirm()) */
  .modal-overlay{
    position:fixed; inset:0;
    background: rgba(23,50,79,0.55);
    display:flex; align-items:center; justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .modal-box{
    background: var(--carta);
    border-radius: 18px;
    padding: 28px 24px;
    max-width: 340px;
    width:100%;
    text-align:center;
    box-shadow: 5px 5px 0 var(--inchiostro);
  }
  .modal-frage{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:16px;
    color: var(--inchiostro);
    margin-bottom:22px;
    line-height:1.45;
  }
  .modal-aktionen{
    display:flex;
    gap:12px;
    justify-content:center;
  }
  .modal-btn{
    border:none;
    border-radius: 999px;
    padding: 11px 22px;
    font-size:14px;
    font-weight:600;
    font-family: inherit;
    cursor:pointer;
  }
  .modal-btn:active{ transform: translate(1px,1px); }
  .modal-abbrechen{ background: #f3dede; color: var(--inchiostro); }
  .modal-bestaetigen{ background: var(--mare); color: #fff; }

  /* "Vokabeln laden"-Link, immer zentriert unten, unabhängig vom Zustand */
  .datei-laden-row{
    text-align:center;
    margin-top: 14px;
    font-size:13px;
  }
  .datei-laden-row a{
    color: var(--inchiostro);
    opacity:0.55;
    text-decoration: underline;
    cursor:pointer;
  }
  /* Bewusst blasser als der normale Link -- destruktive Aktion, soll nicht
     versehentlich angetippt werden, aber trotzdem auffindbar bleiben. */
  .datei-laden-row a.gefahr{
    opacity:0.32;
  }
  .datei-laden-fehler{
    background: #fbebe9;
    border: 1.5px solid var(--mare);
    border-radius: 10px;
    padding: 10px 14px;
    font-size:12px;
    color: var(--mare);
    margin: 10px auto 0;
    max-width: 320px;
    text-align:center;
    display:none;
  }

  /* Laden-Übersicht: eigene Vokabeln (oben) vs. vordefinierte Sets (unten) */
  .lade-trenner{
    width:100%;
    max-width:320px;
    border:none;
    border-top:1.5px solid var(--inchiostro);
    opacity:0.18;
    margin: 26px 0 16px;
  }
  .lade-unterschrift{
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.05em;
    opacity:0.45;
    margin-bottom:12px;
    width:100%;

function konjugiere(infinitiv, typ){
  // Reflexivität und die passenden Pronomen zuerst bestimmen — sowohl der
  // IRR-Zweig gleich unten als auch der reguläre Zweig weiter unten brauchen sie.
  const reflexiv = infinitiv.includes("si") && infinitiv.endsWith("si");
  const pronRefl = reflexiv ? ["mi ","ti ","si ","ci ","vi ","si "] : ["","","","","",""];

  if(typ.startsWith("v:IRR:")){
    const basisIRR = typ.replace("v:IRR:","");
    const formen = IRREGOLARI[basisIRR];
    if(formen) return formen.map((f,i) => pronRefl[i] + f);
  }

  // "si" abtrennen UND das dabei ursprünglich wegfallende "e" wieder anhängen:
  // svegliarsi -> "svegliar" + "e" = svegliare (das ist der eigentliche Infinitiv,
  // von dem aus der Stamm berechnet werden muss)
  const basis = reflexiv ? infinitiv.slice(0,-2) + "e" : infinitiv;
  const stamm = basis.slice(0,-3);
  let endungen;
  if(typ === "v:are") endungen = ["o","i","a","iamo","ate","ano"];
  else if(typ === "v:ere") endungen = ["o","i","e","iamo","ete","ono"];
  else if(typ === "v:ire") endungen = ["o","i","e","iamo","ite","ono"];
  else if(typ === "v:isc") endungen = ["isco","isci","isce","iamo","ite","iscono"];
  else endungen = ["o","i","e","iamo","ete","ono"];
  // Italienische Rechtschreibregel Nr. 1: endet der Stamm auf "i" (z.B. "mangi-" von
  // mangiare) und beginnt die Endung ebenfalls mit "i" (-i, -iamo), verschmilzt
  // das doppelte i zu einem einzigen -> mangi + iamo = mangiamo, nicht mangiiamo.
  //
  // Italienische Rechtschreibregel Nr. 2 (das Gegenstück): endet der Stamm auf "c"
  // oder "g" (z.B. "gioc-" von giocare, "pag-" von pagare) und beginnt die Endung
  // mit "i", muss ein "h" eingeschoben werden -> gioc + h + iamo = giochiamo, nicht
  // giociamo. Grund: "ci"/"gi" wird im Italienischen weich ausgesprochen (wie in
  // "cena", "gente"), aber das "c"/"g" am Stammende von -care/-gare-Verben ist hart
  // (wie in "casa", "gatto") und muss das auch in der konjugierten Form bleiben.
  // Gilt nur für v:are, weil dieses Hart/Weich-Problem nur bei -care/-gare-Infinitiven
  // auftritt -- bei -ere/-ire ergibt sich die Aussprache schon aus dem Infinitiv selbst.
  return endungen.map((e,i) => {
    let form;
    if(typ === 'v:are' && (stamm.endsWith('c') || stamm.endsWith('g')) && e.startsWith('i')){
      form = stamm + 'h' + e;
    } else if(stamm.endsWith('i') && e.startsWith('i')){
      form = stamm + e.slice(1);
    } else {
      form = stamm + e;
    }
    return pronRefl[i] + form;
  });
}

function istVerb(v){ return v.typ && v.typ.startsWith("v:"); }

// Wandelt den Text EXAKT so um, wie er in der xlsx-Zelle steht -- inklusive
// Zeilenumbrüchen, die durch Strg+Enter (bzw. Alt+Enter) innerhalb einer
// Zelle entstanden sind. SheetJS liest solche Umbrüche als normale "\n"-
// Zeichen im String ein; ein HTML-<div> ignoriert "\n" aber standardmäßig
// (Whitespace wird zusammengefasst), deshalb hier die Umwandlung in <br>.
// Escaped zusätzlich <, >, & -- sonst könnte durch das nachträgliche
// Einfügen von <br> mitten in unescape-tem Text kaputtes HTML entstehen,
// falls eine Zelle zufällig eines dieser Zeichen enthält.
function zellenTextHTML(text){
  if(text === null || text === undefined) return '';
  return String(text)
    .replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))
    .replace(/\r\n|\r|\n/g, '<br>');
}

// Gibt es für diese Karte überhaupt eine Notiz-Seite? Ja, sobald mindestens
// eines der beiden Felder gefüllt ist. Eine Funktion für diese Prüfung, statt
// "v.notiz1 || v.notiz2" mehrfach im Code zu wiederholen (siehe maxZustandFuer,
// die "Antippen für..."-Hinweise).
function hatNotiz(v){
  return !!(v.notiz1 || v.notiz2);
}

// Höchster erreichbarer zustand-Wert für eine Karte. Reihenfolge ist immer
// front(0) -> back(1) -> [konjugation, nur bei Verben] -> [notiz1, falls
// vorhanden] -> [notiz2, falls vorhanden]. notiz1 und notiz2 zählen jetzt
// als ZWEI getrennte Zustände (zwei separate Karten zum Umblättern),
// nicht mehr als eine gemeinsame Notiz-Seite.
// Beide Spalten müssen gefüllt sein -- bei nur einer gefüllten Spalte (oder
// keiner) gibt's laut Anforderung KEINE eigene Seite dafür.
function hatUebersetzung(v){
  return !!(v.uebersetzung_de && v.uebersetzung_it);
}

// Höchster erreichbarer zustand-Wert für eine Karte. Reihenfolge:
// front(0) -> back(1) -> [bei Verben: konjugation(2) -> beispielsatz(3)]
// -> [übersetzung, falls uebersetzung_de UND uebersetzung_it gefüllt]
// -> [notiz1, falls vorhanden] -> [notiz2, falls vorhanden].
// Die Beispielsatz-Seite ist ein fester Bestandteil jeder Verb-Karte (steht
// nicht mehr auf front/back), deshalb pauschal +1 bei Verben, nicht an eine
// Bedingung wie "gibt es einen Satz" geknüpft -- gibBeispiel() liefert bei
// Verben ohnehin immer mindestens den italienischen Satz (siehe dort).
function maxZustandFuer(v){
  let max = istVerb(v) ? 3 : 1;
  if(hatUebersetzung(v)) max += 1;
  if(v.notiz1) max += 1;
  if(v.notiz2) max += 1;
  return max;
}

// ---------- Automatische Worttyp-Erkennung ----------
// Ersetzt die frühere "typ"-Spalte in der xlsx: der Typ wird direkt aus dem
// italienischen Wort abgeleitet, keine manuelle Angabe mehr nötig.

function hatArtikel(it){
  // Nomen werden in diesem Projekt per Konvention mit Artikel gespeichert (z.B. "la casa"),
  // Verben und Adjektive nie. Das macht diese Prüfung überraschend zuverlässig.
  // Sonderfall "l'": anders als "il/la/lo/..." steht davor NIE ein Leerzeichen
  // (l'amico, l'acqua) — deshalb eigene, von den anderen Artikeln getrennte Prüfung.
  const wort = it.trim();
  return /^(il|lo|la|i|le|gli)\s/i.test(wort) || /^l['’]/i.test(wort);
}

function basisInfinitiv(wort){
  // Reflexive Verben (z.B. "svegliarsi") auf die Grundform zurückführen ("svegliare"),
  // damit die Endungs- und IRREGOLARI-Prüfung greift. konjugiere() kümmert sich später
  // ohnehin selbst um die mi/ti/si/ci/vi-Pronomen anhand des Original-Infinitivs.
  if(/(arsi|ersi|irsi)$/.test(wort)) return wort.slice(0, -2) + 'e';
  return wort;
}

function erkenneTyp(it){
  const wort = it.trim().toLowerCase();
  if(hatArtikel(wort)) return 'n';

  const basis = basisInfinitiv(wort);
  if(IRREGOLARI[basis]) return 'v:IRR:' + basis;
  if(basis.endsWith('are')) return 'v:are';
  if(basis.endsWith('ere')) return 'v:ere';
  if(basis.endsWith('ire')) return ISC_VERBEN.has(basis) ? 'v:isc' : 'v:ire';

  return 'x'; // weder Artikel noch Verb-Endung -> generisches Beispiel (Adjektive, Sonstiges)
}

function mische(array){
  const a = array.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- Beispielsätze (nur für Verben, aus den 500 kuratierten Verben) ----------
// Bei Nomen, Adjektiven & Sonstigem kommt ein Beispielsatz ausschließlich über die
// notizen-Spalte (eigene Kartenseite) -- kein automatisch generiertes Template mehr.
// sprache: 'it' oder 'de' -- muss zur Sprache des Worts passen, das gerade neben
// dem Satz angezeigt wird (also zur "antwort" auf der back-Seite). Vorher wurde
// hier hart satz_it zurückgegeben, unabhängig von der Lernrichtung -- dadurch
// stand bei IT->DE-Richtung ein italienischer Satz unter dem deutschen Wort.
function gibBeispiel(v, sprache){
  if(!istVerb(v)) return '';
  // Gleiche Normalisierung wie in erkenneTyp(): BEISPIELSAETZE ist komplett
  // kleingeschrieben angelegt. Ohne trim()/toLowerCase() hier würde z.B. "Dormire"
  // (Großschreibung in der xlsx) den Eintrag "dormire" nicht finden -- der Lookup
  // scheitert dann still (vorbereitet === undefined), ohne Fehler oder Hinweis.
  const key = v.it.trim().toLowerCase();
  const vorbereitet = BEISPIELSAETZE[key];
  if(vorbereitet) return sprache === 'de' ? vorbereitet.satz_de : vorbereitet.satz_it;
  // Fallback nur für den Fall, dass ein Verb NICHT in den 500 kuratierten steht
  // (z.B. ein Verb, das du selbst per xlsx hinzugefügt hast). Die konjugierten
  // Formen sind immer italienisch -- für "de" gibt es keinen sinnvollen generischen
  // Fallback-Satz, daher dort lieber gar keinen Satz zeigen als einen falschen.
  if(sprache === 'de') return '';
  const formen = konjugiere(v.it, v.typ);
  return `Io ${formen[0]} spesso. / Noi ${formen[3]} insieme.`;
}

// Neu ab hier: APP_VERSION gab es vorher nicht in dieser Datei. Dient als

const APP_VERSION = 'V27';

let AKTIVE_DATEI = null;  // { blattname: [ {it,de,kat,typ}, ... ], ... } — alle Decks der zuletzt geladenen xlsx
let DECK_NAME = null;     // Name des aktuell gewählten Arbeitsblatts/Decks
let RICHTUNG = 'it-de';   // 'it-de' = Italienisch zeigen, Deutsch erraten | 'de-it' = umgekehrt
let SORTIERT = true;      // true = Reihenfolge wie in der xlsx | false = gemischt

// Wiedervorlagestapel: deckübergreifende Sammlung "gemerkter" Karten.
// Jeder Eintrag ist eine Kopie der Vokabel PLUS dem Namen ihres Ursprungs-
// Decks (deck), damit beim Lernen des Stapels dieselben Kartenseiten
// (inkl. Konjugation, falls Verb) funktionieren wie im Original-Deck.
// WIEDERVORLAGE_DECK ist ein Sentinel-Name -- kollidiert praktisch nie mit
// einem echten Arbeitsblattnamen -- und wird als ganz normaler DECK_NAME
// behandelt. Dadurch funktionieren waehleDeck(), Fortschrittsspeicherung
// usw. für den Stapel automatisch mit, ohne eigenen Sonderweg.
const WIEDERVORLAGE_DECK = '★ Wiedervorlage';
let WIEDERVORLAGE = [];

// Baut VOKABELN aus dem aktuellen Deck neu auf, abhängig von SORTIERT.
// Sonderfall Wiedervorlagestapel: Quelle ist dann WIEDERVORLAGE statt
// AKTIVE_DATEI[DECK_NAME] -- der Rest (Sortiert/Gemischt, Kartenanzeige)
// funktioniert identisch, weil die Einträge dieselbe Feldstruktur haben.
// .slice() bei sortiert wichtig: liefert eine Kopie, damit VOKABELN nie auf
// dasselbe Array-Objekt wie AKTIVE_DATEI[DECK_NAME] zeigt -- sonst würde
// spätere Bearbeitung von VOKABELN (aktuell passiert das nirgends, aber sicher
// ist sicher) versehentlich auch die Originaldaten verändern.
function vokabelnNeuLaden(){
  const quelle = DECK_NAME === WIEDERVORLAGE_DECK ? WIEDERVORLAGE : AKTIVE_DATEI[DECK_NAME];
  return SORTIERT ? quelle.slice() : mische(quelle);
}
let VOKABELN = [];
let idx = 0;
let zustand = 0; // 0 = Frage, 1 = Antwort, 2 = Konjugation (nur bei Verben, immer italienisch)

// Falls window.storage nicht existiert (z.B. beim Hosting auf GitHub Pages,
// im Gegensatz zur Claude-Artefakt-Umgebung, wo diese API bereitgestellt wird),
// bauen wir hier einen Ersatz auf Basis von localStorage. Die Schnittstelle
// (get/set/delete/list, jeweils async, gleiche Rückgabeform) ist identisch,
// dadurch merken ladeDatei(), speichereDatei() usw. weiter unten gar nicht,
// dass sie mit einem Ersatz statt dem Original sprechen.
if (typeof window.storage === 'undefined') {
  window.storage = {
    async get(key){
      const value = localStorage.getItem(key);
      return value === null ? null : { key, value };
    },
    async set(key, value){
      localStorage.setItem(key, value);
      return { key, value };
    },
    async delete(key){
      localStorage.removeItem(key);
      return { key, deleted: true };
    },
    async list(prefix){
      const keys = [];
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    }
  };
}

// Räumt zwei Dinge auf, wenn eine neue Datei hochgeladen oder die App
// komplett zurückgesetzt wird:
// 1) vocab-progress-* Keys -- reine Alt-Daten-Bereinigung: die App selbst
//    schreibt solche Keys seit Entfernen des Fortschritts-Trackings nicht

//    Browser noch rumliegen.
// 2) Der Wiedervorlagestapel -- der bezieht sich auf konkrete Karten der
//    ALTEN Datei und ergibt nach einem Datei-Wechsel keinen Sinn mehr.
async function loescheAltenFortschritt(){
  try{
    const liste = await window.storage.list('vocab-progress-');
    if(liste && liste.keys){
      for(const k of liste.keys){ await window.storage.delete(k); }
    }
  }catch(e){}
  try{ await window.storage.delete('vocab-wiedervorlage'); }catch(e){}
  WIEDERVORLAGE = [];
}

async function ladeWiedervorlage(){
  try{
    const res = await window.storage.get('vocab-wiedervorlage');
    if(res && res.value) return JSON.parse(res.value);
  }catch(e){}
  return [];
}
async function speichereWiedervorlage(){
  try{ await window.storage.set('vocab-wiedervorlage', JSON.stringify(WIEDERVORLAGE)); }catch(e){}
}

// Eindeutiger Schlüssel für eine Karte über Deckgrenzen hinweg: Deckname +
// it + de. Es gibt keine echte ID-Spalte in der xlsx, aber it+de ist
// innerhalb eines Decks praktisch immer eindeutig -- und der Deckname
// verhindert Kollisionen zwischen gleichnamigen Vokabeln in verschiedenen Decks.
function wiedervorlageSchluessel(deck, v){
  return deck + '::' + v.it + '::' + v.de;
}

function istInWiedervorlage(deck, v){
  const schluessel = wiedervorlageSchluessel(deck, v);
  return WIEDERVORLAGE.some(e => wiedervorlageSchluessel(e.deck, e) === schluessel);
}

// Umschalten (Merken/Entmerken) -- genutzt beim Lernen eines NORMALEN Decks.
// Speichert eine eigenständige Kopie der Vokabel (inkl. typ, für Konjugation),
// damit die Karte im Stapel unabhängig vom Original-Deck weiterlebt.
async function wiedervorlageUmschalten(deck, v){
  const schluessel = wiedervorlageSchluessel(deck, v);
  const bestehenderIndex = WIEDERVORLAGE.findIndex(e => wiedervorlageSchluessel(e.deck, e) === schluessel);
  if(bestehenderIndex === -1){
    WIEDERVORLAGE.push({ deck, it:v.it, de:v.de, kat:v.kat, notiz1:v.notiz1, notiz2:v.notiz2, uebersetzung_de:v.uebersetzung_de, uebersetzung_it:v.uebersetzung_it, typ:v.typ });
  } else {
    WIEDERVORLAGE.splice(bestehenderIndex, 1);
  }
  await speichereWiedervorlage();
}

// Endgültiges Entfernen -- genutzt beim Lernen des Wiedervorlagestapels
// SELBST. v ist hier bereits ein Wiedervorlage-Eintrag (hat .deck).
async function wiedervorlageEntfernen(v){
  const schluessel = wiedervorlageSchluessel(v.deck, v);
  WIEDERVORLAGE = WIEDERVORLAGE.filter(e => wiedervorlageSchluessel(e.deck, e) !== schluessel);
  await speichereWiedervorlage();
}

// ---------- Kompletter App-Reset ----------
// Eigenes Bestätigungs-Dialogfeld statt des nativen confirm() -- sieht in
// jedem Browser gleich aus (passt zum Rest der App) statt dem hässlichen,
// browserabhängigen System-Popup. Als eigene, allgemeine Funktion gebaut
// (nicht fest in appZuruecksetzen() verdrahtet), falls später an anderer
// Stelle nochmal eine Bestätigung gebraucht wird.
//
// Gibt ein Promise<boolean> zurück, genau wie das normale confirm() einen
// synchronen boolean liefert -- await zeigeBestaetigung(...) verhält sich
// im aufrufenden Code also fast identisch zu vorher.
function zeigeBestaetigung(frage){
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-frage">${frage}</div>
        <div class="modal-aktionen">
          <button class="modal-btn modal-abbrechen" id="modalAbbrechen">Abbrechen</button>
          <button class="modal-btn modal-bestaetigen" id="modalBestaetigen">Zurücksetzen</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const aufraeumen = (ergebnis) => {
      document.body.removeChild(overlay);
      resolve(ergebnis);
    };
    overlay.querySelector('#modalAbbrechen').onclick = () => aufraeumen(false);
    overlay.querySelector('#modalBestaetigen').onclick = () => aufraeumen(true);
    // Klick auf den abgedunkelten Hintergrund (nicht auf die Box selbst)

// haben, daher der Check "gibt's das Zielelement überhaupt noch".
function renderVordefinierteVokabelsets(eintraege){
  const ziel = document.getElementById('ladeListe');
  if(!ziel) return;

  if(eintraege.length === 0){
    ziel.innerHTML = `<div class="lade-status">Keine Einträge in config.xlsx gefunden.</div>`;
    return;
  }

  const escape = s => s.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));

  ziel.innerHTML = eintraege.map((e, i) => `
    <div class="lade-kachel" data-index="${i}">
      <span class="lade-icon">📥</span>
      <span class="lade-label">${escape(e.anzeigename)}</span>
    </div>

  ziel.querySelectorAll('[data-index]').forEach(el => {
    el.onclick = async () => {

      const textVorher = labelEl.textContent;
      labelEl.textContent = 'Lädt …';
      try{
        const decks = await ladeVokabelDateiVonGithub(eintrag.dateiname);
        if(Object.keys(decks).length === 0){
          throw new Error('Datei gefunden, aber keine gültigen Arbeitsblätter darin.');
        }
        await loescheAltenFortschritt();
        await speichereDatei(decks);
        AKTIVE_DATEI = decks;
        zeigeDeckAuswahl();
      } catch(err){
        labelEl.textContent = textVorher;
        fehlerEl.textContent = 'Konnte "' + eintrag.dateiname + '" nicht laden: ' + err.message;

    };
  });
}

// ---------- Datei einlesen ----------
async function verarbeiteDatei(file){
  const fehlerEl = document.getElementById('uploadFehler');
  if(fehlerEl) fehlerEl.style.display = 'none';

  const name = file.name.toLowerCase();
  if(!name.endsWith('.xlsx') && !name.endsWith('.xls')){
    zeigeUploadFehler('Bitte nur .xlsx Dateien hochladen.');
    return;
  }

  let decks;
  try{
    decks = await leseXLSXDatei(file);
  } catch(e){
    zeigeUploadFehler('Fehler beim Lesen der Datei: ' + e.message);
    return;
  }

  const namen = Object.keys(decks);
  if(namen.length === 0){
    zeigeUploadFehler('Keine gültigen Arbeitsblätter gefunden. Jedes Blatt braucht Spalten "it" und "de".');
    return;
  }

  await loescheAltenFortschritt();
  await speichereDatei(decks);
  AKTIVE_DATEI = decks;
  zeigeDeckAuswahl();
}

// Sucht in den ersten Zeilen eines Blatts die Header-Zeile (Zellen "it" und "de")
// und liest ab dort die Datensätze ein. So funktioniert es auch, wenn vor dem
// Header noch Titel-/Erklärzeilen stehen (wie in der Vorlage). "typ" wird nicht
// mehr aus der Datei gelesen — erkenneTyp() bestimmt ihn automatisch aus "it".
function parseSheet(zeilen){
  let headerIdx = -1, itIdx = -1, deIdx = -1, katIdx = -1, notiz1Idx = -1, notiz2Idx = -1;
  let uebersetzungDeIdx = -1, uebersetzungItIdx = -1;
  for(let i = 0; i < Math.min(zeilen.length, 15); i++){
    const zeile = zeilen[i].map(z => (z||'').toString().trim().toLowerCase());
    const itPos = zeile.indexOf('it');
    const dePos = zeile.indexOf('de');
    if(itPos !== -1 && dePos !== -1){
      headerIdx = i; itIdx = itPos; deIdx = dePos;
      katIdx = zeile.indexOf('kat');
      // "notiz1" ist der aktuelle Spaltenname. Ältere xlsx-Dateien (z.B. die
      // ursprüngliche Vorlage) nutzen noch "notizen" -- wird dann als notiz1
      // gelesen, damit bestehende Dateien beim Import nichts verlieren.
      notiz1Idx = zeile.indexOf('notiz1');
      if(notiz1Idx === -1) notiz1Idx = zeile.indexOf('notizen');
      notiz2Idx = zeile.indexOf('notiz2');
      uebersetzungDeIdx = zeile.indexOf('uebersetzung_de');
      uebersetzungItIdx = zeile.indexOf('uebersetzung_it');
      break;
    }
  }
  if(headerIdx === -1) return [];

  const result = [];
  for(let i = headerIdx + 1; i < zeilen.length; i++){
    const row = zeilen[i];
    const it = (row[itIdx]||'').toString().trim();
    const de = (row[deIdx]||'').toString().trim();
    if(!it || !de) continue;
    // Lange Texte sind vermutlich Erklär-/Platzhaltertext, kein echtes Vokabelpaar
    if(it.length > 40 || de.length > 40) continue;
    // Eine "kat"-Zelle mit Klammern (z.B. "Kategorie (optional)") verrät eine
    // Beschreibungszeile aus einer Vorlage, keinen echten Kategorienamen.
    // Achtung: dieser Filter gilt NUR für kat, nicht für die Notiz-/Übersetzungs-
    // Spalten -- eigene Notizen/Übersetzungen dürfen völlig legitim Klammern enthalten.
    const katRoh = katIdx !== -1 ? (row[katIdx]||'').toString() : '';
    if(katRoh.includes('(')) continue;
    result.push({
      it,
      de,
      kat: katIdx !== -1 ? (katRoh.trim() || 'Eigene') : 'Eigene',
      notiz1: notiz1Idx !== -1 ? (row[notiz1Idx]||'').toString().trim() : '',
      notiz2: notiz2Idx !== -1 ? (row[notiz2Idx]||'').toString().trim() : '',
      uebersetzung_de: uebersetzungDeIdx !== -1 ? (row[uebersetzungDeIdx]||'').toString().trim() : '',
      uebersetzung_it: uebersetzungItIdx !== -1 ? (row[uebersetzungItIdx]||'').toString().trim() : '',
      typ: erkenneTyp(it)
    });
  }
  return result;
}

// Sorgt dafür, dass window.XLSX verfügbar ist (lädt SheetJS bei Bedarf nach).
// Eigene Funktion, weil sowohl der Datei-Upload als auch der GitHub-Import
// (weiter unten) die Bibliothek brauchen -- so steht das Nachladen nur einmal.
function ladeSheetJSBibliothek(){
  return new Promise((resolve, reject) => {
    if(window.XLSX){ resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    script.onload = () => resolve();
    script.onerror = () => reject(new Error('SheetJS-Bibliothek konnte nicht geladen werden.'));
    document.head.appendChild(script);
  });
}

// Gemeinsame Kernlogik: fertiges Workbook (von XLSX.read()) -> Deck-Struktur.
// Genutzt sowohl vom Datei-Upload (_parseWorkbook) als auch vom GitHub-Import
// (ladeVokabelDateiVonGithub), damit die Umwandlung nur an einer Stelle steht.
function deckAusWorkbook(wb){
  const decks = {};
  for(const blattname of wb.SheetNames){
    const ws = wb.Sheets[blattname];
    const zeilen = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    const eintraege = parseSheet(zeilen);
    if(eintraege.length > 0) decks[blattname] = eintraege;
  }
  return decks;
}

function leseXLSXDatei(file){
  return new Promise((resolve, reject) => {
    ladeSheetJSBibliothek()
      .then(() => _parseWorkbook(file, resolve, reject))
      .catch(reject);
  });
}

function _parseWorkbook(file, resolve, reject){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      resolve(deckAusWorkbook(wb));
    } catch(err){ reject(err); }
  };
  reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden.'));
  reader.readAsArrayBuffer(file);
}

// ---------- Dateien direkt von GitHub laden (config.xlsx + Vokabeldateien) ----------
// Gemeinsame Basis-URL: alle Dateien liegen im Root des main-Branchs.
// raw.githubusercontent.com liefert die Rohdatei (nicht die HTML-Ansichtsseite
// von github.com) und setzt CORS-Header, die fetch() von einer anderen Domain
// (deiner github.io-Seite) aus erlauben.
//
// Statt Benutzername/Repo fest einzutragen, leiten wir beides aus der
// aktuellen Seiten-URL ab (window.location). Vorteil: derselbe Code
// funktioniert unverändert in jedem Repo -- auch in einem separaten
// Test-Repo wie "vocabolario_test" -- ohne dass hier je eine URL von Hand
// angepasst werden muss.
// Erwartetes Format: https://BENUTZERNAME.github.io/REPO-NAME/...
function ermittleGithubRawBasis(){
  const benutzername = window.location.hostname.split('.')[0]; // "cb-os1" aus "cb-os1.github.io"
  const pfadTeile = window.location.pathname.split('/').filter(Boolean);
  const repo = pfadTeile[0] || '';
  return `https://raw.githubusercontent.com/${benutzername}/${repo}/main/`;
}
const GITHUB_RAW_BASIS = ermittleGithubRawBasis();

// Lädt eine beliebige Datei aus dem Repo per Dateinamen und gibt das fertig
// eingelesene Workbook zurück. Wird sowohl vom Config-Import als auch vom
// Vokabeldatei-Import genutzt (DRY: Fetch+Fehlerbehandlung nur an einer Stelle).
async function ladeDateiVonGithub(dateiname){
  await ladeSheetJSBibliothek();
  const res = await fetch(GITHUB_RAW_BASIS + encodeURIComponent(dateiname));
  if(!res.ok){
    throw new Error('"' + dateiname + '" nicht gefunden (Status ' + res.status + ').');
  }
  const buffer = await res.arrayBuffer();
  return XLSX.read(buffer, {type:'array'});
}

// Liest config.xlsx (erstes Arbeitsblatt, Spalten "Anzeigename"/"Dateiname")
// und gibt eine Liste sauberer Einträge zurück, leere/kaputte Zeilen werden
// rausgefiltert.
async function ladeConfigVonGithub(){
  const wb = await ladeDateiVonGithub('config.xlsx');
  const ws = wb.Sheets[wb.SheetNames[0]];
  const zeilen = XLSX.utils.sheet_to_json(ws, {defval:''});
  return zeilen
    .map(z => ({
      anzeigename: String(z['Anzeigename'] || '').trim(),
      dateiname: String(z['Dateiname'] || '').trim()
    }))
    .filter(e => e.anzeigename && e.dateiname);
}

async function ladeVokabelDateiVonGithub(dateiname){
  const wb = await ladeDateiVonGithub(dateiname);
  return deckAusWorkbook(wb);
}

function gibFaceHTML(v, zustand){
  // Bei RICHTUNG === 'de-it' wird die Frage-/Antwort-Seite gegenüber
  // dem Standardfall ('it-de') einfach vertauscht.
  const frage = RICHTUNG === 'de-it' ? v.de : v.it;
  const antwort = RICHTUNG === 'de-it' ? v.it : v.de;

  if(zustand === 0){
    return `<div class="face front">
      <div class="kategorie">${zellenTextHTML(v.kat)}</div>
      <div class="wort">${zellenTextHTML(frage)}</div>
      <div class="hinweis">Antippen für die Übersetzung</div>
    </div>`;
  }
  if(zustand === 1){
    // Der Hinweis zeigt IMMER an, was als Nächstes kommt -- die Reihenfolge
    // ist: Verb? -> Konjugation. Sonst: Übersetzungs-Spalten gefüllt? ->
    // Übersetzung. Sonst: Notiz vorhanden? -> Notiz. Sonst gar kein Hinweis
    // (das ist dann bereits die letzte Seite dieser Karte).
    let naechsterHinweis = '';
    if(istVerb(v)){
      naechsterHinweis = '<div class="hinweis" style="opacity:0.5">Antippen für die Konjugation</div>';
    } else if(hatUebersetzung(v)){
      naechsterHinweis = '<div class="hinweis" style="opacity:0.5">Antippen für die Übersetzung</div>';
    } else if(hatNotiz(v)){
      naechsterHinweis = '<div class="hinweis" style="opacity:0.5">Antippen für deine Notiz</div>';
    }
    return `<div class="face back">
      <div class="kategorie">${zellenTextHTML(v.kat)}</div>
      <div class="wort">${zellenTextHTML(antwort)}</div>
      ${naechsterHinweis}
    </div>`;
  }

  // Ab hier: Positionen NACH front/back. naechsteFreieZustand verfolgt immer,
  // an welcher zustand-Nummer die jeweils nächste (optionale) Seitenart säße
  // -- so muss nicht an jeder Stelle neu gezählt werden, welche Seiten davor
  // tatsächlich existieren.
  let naechsteFreieZustand;

  if(istVerb(v)){
    if(zustand === 2){
      // Konjugation ist immer italienisch, unabhängig von der gewählten Lernrichtung.
      // Danach kommt bei Verben IMMER der kuratierte Beispielsatz (zustand 3) --
      // deshalb hier kein bedingter Hinweistext nötig.
      const formen = konjugiere(v.it, v.typ);
      const zeilen = PRONOMEN.map((p,i) => `<tr><td class="pron">${p}</td><td class="form">${formen[i]}</td></tr>`).join('');
      return `<div class="face konjugation">
        <div class="kategorie">Konjugation · Presente</div>
        <div class="wort" style="font-size:24px; margin-bottom:4px;">${zellenTextHTML(v.it)}</div>
        <table class="konj-tabelle">${zeilen}</table>
        <div class="hinweis" style="opacity:0.5">Antippen für den Beispielsatz</div>
      </div>`;
    }
    if(zustand === 3){
      // Eigene Seite für den kuratierten Beispielsatz (steht nicht mehr auf
      // front/back). Zeigt IMMER beide Sprachen untereinander -- Reihenfolge
      // richtet sich nach RICHTUNG: bei DE->IT steht Deutsch oben.
      const ersteSprache = RICHTUNG === 'de-it' ? 'de' : 'it';
      const zweiteSprache = RICHTUNG === 'de-it' ? 'it' : 'de';
      const ersterSatz = gibBeispiel(v, ersteSprache);
      const zweiterSatz = gibBeispiel(v, zweiteSprache);
      let hinweis = '';
      if(hatUebersetzung(v)) hinweis = '<div class="hinweis" style="opacity:0.5">Antippen für die Übersetzung</div>';
      else if(hatNotiz(v)) hinweis = '<div class="hinweis" style="opacity:0.5">Antippen für deine Notiz</div>';
      return `<div class="face beispielsatz">
        ${ersterSatz ? `<div class="beispiel">${ersterSatz}</div>` : ''}
        ${zweiterSatz ? `<div class="beispiel">${zweiterSatz}</div>` : ''}
        ${hinweis}
      </div>`;
    }
    naechsteFreieZustand = 4;
  } else {
    naechsteFreieZustand = 2;
  }

  // Übersetzungsseite aus den xlsx-Spalten uebersetzung_de/uebersetzung_it --
  // bei Verben nach dem kuratierten Beispielsatz, sonst direkt nach der
  // Antwortseite. Nur wenn BEIDE Spalten gefüllt sind (siehe hatUebersetzung()).
  if(hatUebersetzung(v) && zustand === naechsteFreieZustand){
    const ersteSprache = RICHTUNG === 'de-it' ? 'de' : 'it';
    const ersterText = ersteSprache === 'de' ? v.uebersetzung_de : v.uebersetzung_it;
    const zweiterText = ersteSprache === 'de' ? v.uebersetzung_it : v.uebersetzung_de;
    const hinweis = hatNotiz(v) ? '<div class="hinweis" style="opacity:0.5">Antippen für deine Notiz</div>' : '';
    return `<div class="face uebersetzung">
      <div class="beispiel">${zellenTextHTML(ersterText)}</div>
      <div class="beispiel">${zellenTextHTML(zweiterText)}</div>
      ${hinweis}
    </div>`;
  }
  if(hatUebersetzung(v)) naechsteFreieZustand += 1;

  // Notiz-Seiten: notiz1 und notiz2 sind zwei getrennte Karten zum
  // Umblättern. notizListe enthält nur die tatsächlich gefüllten Felder, in
  // der Reihenfolge notiz1 -> notiz2 -- fehlt notiz1, rückt notiz2 einfach
  // als einzige/erste Notiz-Karte nach. naechsteFreieZustand zeigt an dieser
  // Stelle bereits exakt auf den ersten Notiz-zustand.
  const notizListe = [];
  if(v.notiz1) notizListe.push(v.notiz1);
  if(v.notiz2) notizListe.push(v.notiz2);
  const notizIndex = zustand - naechsteFreieZustand;
  const gibtWeitereNotiz = notizIndex < notizListe.length - 1;
  const notizHinweis = gibtWeitereNotiz
    ? '<div class="hinweis" style="opacity:0.5">Antippen für die nächste Notiz</div>'
    : '';
  // Bewusst keine "Notiz"-Beschriftung mehr oben links -- die Notizseite
  // ist stattdessen jetzt farblich erkennbar (siehe .face.notiz-CSS).
  return `<div class="face notiz">
    <div class="notiz-text">${zellenTextHTML(notizListe[notizIndex])}</div>
    ${notizHinweis}
  </div>`;
}

function render(){
  if(idx >= VOKABELN.length){
    stage.innerHTML = `
      <div class="fertig">
        <div class="wort">Stapel geschafft 🇮🇹</div>
        <button id="nochmal" style="box-shadow:3px 3px 0 var(--inchiostro)">Von vorne beginnen</button>
        <div class="reset-row" style="margin-top:14px;"><a id="zurueckZurLetzten">← Zur letzten Karte zurück</a></div>
      </div>`;
    document.getElementById('nochmal').onclick = () => { idx = 0; VOKABELN = vokabelnNeuLaden(); render(); };
    document.getElementById('zurueckZurLetzten').onclick = () => { idx = VOKABELN.length - 1; render(); };
    return;
  }

  const v = VOKABELN[idx];
  zustand = 0;

  stage.innerHTML = `
    <div class="deck-label">${idx+1} / ${VOKABELN.length} · ${DECK_NAME} · ${RICHTUNG === 'de-it' ? 'DE→IT' : 'IT→DE'}</div>
    <div class="card" id="karte">
      ${gibFaceHTML(v, 0)}
    </div>
    <div class="controls">
      <button class="btn-zurueck" id="btnZurueckKarte" ${idx === 0 ? 'disabled' : ''}>← Zurück</button>
      ${gibMerkenButtonHTML(v)}
      <button class="btn-weiter" id="btnWeiter">Weiter →</button>
    </div>
  `;

  const karte = document.getElementById('karte');
  aktiviereWischGesten(karte, v);

  document.getElementById('btnWeiter').onclick = (e) => { e.stopPropagation(); weiter(); };
  document.getElementById('btnZurueckKarte').onclick = (e) => { e.stopPropagation(); vorherige(); };
  document.getElementById('btnMerken').onclick = (e) => { e.stopPropagation(); merkenKlick(v); };
}

// Baut Beschriftung/Zustand des mittleren Buttons. Zwei grundverschiedene
// Bedeutungen je nachdem, ob gerade der Wiedervorlagestapel selbst gelernt
// wird oder ein normales Deck (siehe merkenKlick() für die Gegenstücke):
// - normales Deck: Umschalter Merken/Gemerkt (Karte rein/raus aus dem Stapel)
// - Wiedervorlagestapel: "Entfernen" -- wirft die Karte direkt aus dem Stapel
function gibMerkenButtonHTML(v){
  if(DECK_NAME === WIEDERVORLAGE_DECK){
    return `<button class="btn-merken" id="btnMerken">Entfernen</button>`;
  }
  const gemerkt = istInWiedervorlage(DECK_NAME, v);
  return `<button class="btn-merken${gemerkt ? ' aktiv' : ''}" id="btnMerken">${gemerkt ? 'Gemerkt' : 'Merken'}</button>`;
}

async function merkenKlick(v){
  if(DECK_NAME === WIEDERVORLAGE_DECK){
    // v ist idx-genau die gerade angezeigte Karte -- direkt aus dem Stapel
    // UND aus der laufenden Session entfernen (kein "weiter" nötig, die
    // Karte an dieser Position ist ja jetzt bereits die nächste).
    await wiedervorlageEntfernen(v);
    VOKABELN.splice(idx, 1);
    render();
    return;
  }
  await wiedervorlageUmschalten(DECK_NAME, v);
  const btn = document.getElementById('btnMerken');
  if(btn){
    const gemerkt = istInWiedervorlage(DECK_NAME, v);
    btn.textContent = gemerkt ? 'Gemerkt' : 'Merken';
    btn.classList.toggle('aktiv', gemerkt);
  }
}

// Wisch-Erkennung für die Karte: einheitlich für Touch UND Maus über die
// Pointer-Events-API (fasst beide Eingabearten in einem Event-Modell
// zusammen, kein separater touch-/mouse-Code nötig).
//
// setPointerCapture() ist der Grund, warum ein schnelles Wischen auch dann
// noch zuverlässig erkannt wird, wenn der Finger/Mauszeiger während der
// Bewegung über den Kartenrand hinausgleitet: das Element bekommt dadurch
// alle weiteren pointerup-Events für GENAU diesen Zeiger zugestellt, egal
// wo sich der Zeiger inzwischen befindet -- ohne Capture würde ein Loslassen
// außerhalb der Karte gar nicht mehr bei ihr ankommen.
//
// Unterscheidung Tap vs. Wisch: erst bei pointerup wird verglichen, wie weit
// sich der Zeiger seit pointerdown bewegt hat. Deutliche, überwiegend
// horizontale Bewegung (> WISCH_SCHWELLE_PX und mehr horizontal als
// vertikal) = Wisch (kein Umdrehen). Alles andere = normales Antippen.
const WISCH_SCHWELLE_PX = 40;

function aktiviereWischGesten(karte, v){
  let startX = 0, startY = 0, verfolgtGerade = false;

  karte.onpointerdown = (e) => {
    startX = e.clientX;
    startY = e.clientY;
    verfolgtGerade = true;
    karte.setPointerCapture(e.pointerId);
  };

  karte.onpointerup = (e) => {
    if(!verfolgtGerade) return;
    verfolgtGerade = false;
    const deltaX = e.clientX - startX;
    const deltaY = e.clientY - startY;

    if(Math.abs(deltaX) > WISCH_SCHWELLE_PX && Math.abs(deltaX) > Math.abs(deltaY)){
      // Wisch nach links = nächste Karte, nach rechts = vorherige --
      // dieselben Funktionen wie die "Weiter"/"Zurück"-Buttons.
      if(deltaX < 0) weiter(); else vorherige();
    } else {
      const maxZustand = maxZustandFuer(v);
      zustand = (zustand + 1) > maxZustand ? 0 : zustand + 1;
      karte.innerHTML = gibFaceHTML(v, zustand);
      const faceEl = karte.querySelector('.face');
      faceEl.classList.add('eintretend');
      requestAnimationFrame(() => faceEl.classList.remove('eintretend'));
    }
  };

  // Abbruch (z.B. Browser übernimmt die Geste, oder Finger wird vom System
  // unterbrochen) -- keine Aktion auslösen, nur den Verfolgungszustand zurücksetzen.
  karte.onpointercancel = () => { verfolgtGerade = false; };
}

function weiter(){
  idx++;
  render();
}

// Eine Karte zurückspringen. idx wird nie unter 0 gesetzt -- der Zurück-Button
// ist bei der ersten Karte ohnehin deaktiviert (siehe render()), das hier ist
// nur eine zusätzliche Absicherung.
function vorherige(){
  if(idx === 0) return;
  idx--;
  render();
}

document.getElementById('deckLink').onclick = () => {
  zeigeDeckAuswahl();
};

// "VocabolarIo"-Schriftzug oben links fungiert wie eine Home-Taste.
// Anders als "deckLink" (der nur sichtbar ist, wenn schon ein Deck aktiv
// ist) ist der Titel auf JEDEM Bildschirm sichtbar -- auch bevor überhaupt
// eine Datei geladen wurde. Deshalb hier zusätzlich abgesichert: ohne
// geladene Datei zurück zum leeren Startzustand statt zu einem Absturz,
// weil zeigeDeckAuswahl() ohne AKTIVE_DATEI nicht funktionieren würde.
document.getElementById('logoTitel').onclick = () => {
  if(AKTIVE_DATEI) zeigeDeckAuswahl(); else zeigeLeerenZustand();
};

(async function init(){
  console.log('VocabolarIo', APP_VERSION);
  resetRow.style.display = 'none';
  WIEDERVORLAGE = await ladeWiedervorlage();
  const gespeicherteDatei = await ladeDatei();
  if(gespeicherteDatei && Object.keys(gespeicherteDatei).length > 0){
    AKTIVE_DATEI = gespeicherteDatei;
    zeigeDeckAuswahl();
  } else {
    zeigeLeerenZustand();
  }
})();
</script>
